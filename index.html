<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HemoAgenda Pro</title>
    
    <!-- Configuração PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2966/2966327.png">
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Supabase e PDF -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; height: 100vh; overflow: hidden; }
        
        /* 🛡️ PROTEÇÃO CONTRA SELEÇÃO E CÓPIA */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        input, textarea, select { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }

        .screen { display: none; height: 100%; width: 100%; flex-direction: column; }
        .active-screen { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .day-cell { min-height: 130px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border-radius: 12px; background: white; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .day-cell:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 10; }
        .day-active { border: 2px solid #2563eb !important; background-color: #eff6ff !important; }
        .day-today { border-color: #3b82f6 !important; background: #f0f9ff; }
        .day-today .day-number { background: #3b82f6; color: white; border-radius: 6px; padding: 2px 8px; }
        
        .badge-count { background: #e0e7ff; color: #1e40af; font-size: 9px; padding: 2px 6px; border-radius: 9999px; font-weight: 800; }
        .patient-list-mini { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; flex: 1; overflow: hidden; padding: 0 4px; }
        .patient-item-mini { font-size: 9px; color: #334155; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 3px 6px; background: #f1f5f9; border-radius: 6px; border-left: 3px solid #3b82f6; text-transform: uppercase; }
        
        .status-bar { display: flex; gap: 4px; padding: 6px 8px; background: #f8fafc; border-top: 1px solid #f1f5f9; margin-top: auto; align-items: center; }
        .status-dot { height: 6px; width: 6px; border-radius: 50%; }

        #editor-panel, #admin-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-top-left-radius: 24px; border-bottom-left-radius: 24px; }
        .editor-closed { transform: translateX(100%); }
        
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; background: white; }
        th { font-size: 10px; text-transform: uppercase; background: #f8fafc; color: #475569; padding: 12px; border-bottom: 2px solid #e2e8f0; font-weight: 800; }
        td { font-size: 11px; padding: 6px 8px; border-bottom: 1px solid #f1f5f9; }
        
        input { font-size: 11px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; width: 100%; transition: all 0.2s; background: #fdfdfd; }
        input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        select.custom-select { font-size: 11px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; width: 100%; transition: all 0.2s; background: #fdfdfd; cursor: pointer; font-weight: 700; text-align: center; appearance: none; }
        select.custom-select:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

        /* 🛡️ MODO ESPELHO: Aplica o estilo de bloqueado a todos os campos visualmente */
        input:disabled, textarea:disabled, select:disabled { background: #f1f5f9; cursor: not-allowed; color: #64748b; opacity: 0.8; border-color: #e2e8f0; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .stat-card { background: white; padding: 16px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; min-width: 140px; flex: 1; position: relative; overflow: hidden; }
        
        .login-icon-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; align-items: center; }
        .icon-container-login { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .vascular-svg { width: 38px; height: 38px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <!-- TELA LOGIN -->
    <div id="screen-login" class="screen active-screen items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 md:p-12 rounded-[32px] shadow-2xl w-full max-w-sm text-center border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-emerald-500 to-red-500"></div>
            
            <div class="login-icon-box">
                <div class="icon-container-login bg-gradient-to-br from-blue-600 to-blue-800 shadow-blue-200"><i class="fas fa-brain"></i></div>
                <div class="icon-container-login bg-gradient-to-br from-red-600 to-red-800 shadow-red-200"><i class="fas fa-heart"></i></div>
                <div class="icon-container-login bg-gradient-to-br from-emerald-600 to-emerald-800 shadow-emerald-200">
                    <svg class="vascular-svg" viewBox="0 0 24 24">
                        <path d="M12,2 C12,2 10,6 10,10 C10,14 12,18 12,22" />
                        <path d="M12,10 C12,10 15,8 17,6" />
                        <path d="M12,14 C12,14 16,16 18,18" />
                        <path d="M12,12 C12,12 8,10 6,8" />
                        <path d="M12,16 C12,16 7,18 5,20" />
                    </svg>
                </div>
            </div>

            <h1 class="text-3xl font-black text-slate-800 mb-1 tracking-tight">HemoAgenda</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-10">Suite Segura v9.20</p>
            
            <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">E-mail Profissional</label>
                    <input type="text" id="login-user" placeholder="exemplo@gmail.com" class="p-4 w-full border border-slate-200 rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:bg-white focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Palavra-passe</label>
                    <input type="password" id="login-pass" placeholder="••••••••" class="p-4 w-full border border-slate-200 rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:bg-white focus:border-blue-500 transition-all">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black transition-all uppercase tracking-widest text-sm mt-2">Acessar Sistema</button>
            </form>
            <p id="login-msg" class="text-red-500 text-[11px] mt-6 h-10 font-black uppercase tracking-widest leading-tight text-center"></p>
        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="screen-app" class="screen bg-slate-50">
        <header class="h-16 bg-white border-b border-slate-200 flex justify-between items-center px-4 md:px-8 shadow-sm shrink-0 z-20">
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-slate-100 rounded-xl p-1">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-lg transition text-slate-400"><i class="fas fa-chevron-left"></i></button>
                    <div class="text-center w-40 cursor-pointer" onclick="goToToday()">
                        <div id="month-display" class="font-black text-[13px] uppercase text-slate-700">...</div>
                        <div id="year-display" class="font-bold text-[10px] text-slate-400 font-mono">...</div>
                    </div>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-lg transition text-slate-400"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- ETIQUETA MODO ESPELHO (Invisível por Padrão) -->
                <div id="viewer-badge" class="hidden px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-full font-black text-[9px] uppercase tracking-widest border border-indigo-200" style="display: none;">
                    <i class="fas fa-eye mr-1"></i> Modo Visualização
                </div>
                <div id="sync-status" class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-full border border-slate-200 shadow-sm">
                    <i id="cloudIcon" class="fas fa-cloud text-emerald-500 text-[10px]"></i>
                    <span id="cloudLabel" class="text-[9px] font-black text-slate-500 uppercase tracking-widest hidden md:block">Nuvem Pronta</span>
                </div>
                <button onclick="handleLogout()" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-400 hover:text-red-500 transition shadow-sm flex items-center justify-center"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll" id="calendar-area">
                <div class="flex flex-wrap gap-4 mb-8">
                    <div class="stat-card"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Pacientes</span><span id="stat-pacientes" class="text-2xl font-black text-slate-800">0</span></div>
                    <div class="stat-card"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Dias Ativos</span><span id="stat-dias" class="text-2xl font-black text-slate-800">0</span></div>
                    <div class="stat-card"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Pendências</span><span id="stat-pends" class="text-2xl font-black text-amber-500">0</span></div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-4 pb-20"></div>
            </div>

            <!-- Painel Editor -->
            <div id="editor-panel" class="absolute inset-y-0 right-0 w-full md:w-[94%] bg-white shadow-2xl z-30 flex flex-col editor-closed border-l border-slate-200">
                <div class="h-20 border-b border-slate-100 flex justify-between items-center px-8 bg-white shrink-0">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 text-xl font-black" id="editor-day-num">--</div>
                        <div>
                            <h2 id="editor-date" class="font-black text-2xl text-slate-800 uppercase tracking-tighter">DIA X</h2>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportPDF()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-black shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2"><i class="fas fa-file-pdf"></i> PDF DIÁRIO</button>
                        <button onclick="exportPDFVazio()" class="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-[10px] font-black shadow-lg hover:bg-black transition-all flex items-center gap-2"><i class="fas fa-file-pdf"></i> PDF VAZIO</button>
                        <button onclick="closeEditor()" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 flex items-center justify-center transition hover:bg-slate-200"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-8 bg-slate-50/50 custom-scroll">
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Procedimentos do Dia</h3>
                        <button id="btn-add-patient" onclick="addRow()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[11px] font-black hover:bg-blue-700 transition shadow-lg active:scale-95"><i class="fas fa-plus mr-2"></i>ADICIONAR PACIENTE</button>
                    </div>
                    
                    <div class="table-container shadow-sm bg-white border border-slate-200 rounded-2xl overflow-hidden">
                        <div class="overflow-x-auto custom-scroll">
                            <table class="w-full text-left border-collapse min-w-[1850px]">
                                <thead>
                                    <tr>
                                        <th width="90">Horário</th><th width="100">Sala / RPA</th><th width="240">Paciente</th><th width="120">Nascimento</th><th width="70">Idade</th><th width="140">Convénio</th><th width="180">Médico Executor</th><th width="100">Origem</th><th width="200">Procedimento</th><th width="110">Destino</th><th width="110">Material</th><th>Observação</th><th width="50"></th>
                                    </tr>
                                </thead>
                                <tbody id="agenda-body" class="bg-white"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <div class="bg-white p-4 rounded-2xl border border-blue-100 shadow-sm flex flex-col h-full">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Geral</label>
                                <button onclick="clearField(event, 'field-obs-geral')" class="btn-clear text-[9px] font-black text-blue-400 hover:text-blue-700 transition-colors flex items-center gap-1"><i class="fas fa-eraser"></i> LIMPAR</button>
                            </div>
                            <textarea id="field-obs-geral" oninput="debouncedSave()" class="w-full h-28 p-3 text-xs border border-slate-100 rounded-xl bg-slate-50 outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="bg-white p-4 rounded-2xl border border-emerald-100 shadow-sm flex flex-col h-full">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Autorizados</label>
                                <button onclick="clearField(event, 'field-auth')" class="btn-clear text-[9px] font-black text-emerald-400 hover:text-emerald-700 transition-colors flex items-center gap-1"><i class="fas fa-eraser"></i> LIMPAR</button>
                            </div>
                            <textarea id="field-auth" oninput="debouncedSave()" class="w-full h-28 p-3 text-xs border border-slate-100 rounded-xl bg-slate-50 outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="bg-white p-4 rounded-2xl border border-amber-100 shadow-sm flex flex-col h-full">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] font-black text-amber-600 uppercase tracking-widest">Pendências</label>
                                <button onclick="clearField(event, 'field-pend')" class="btn-clear text-[9px] font-black text-amber-400 hover:text-amber-700 transition-colors flex items-center gap-1"><i class="fas fa-eraser"></i> LIMPAR</button>
                            </div>
                            <textarea id="field-pend" oninput="debouncedSave()" class="w-full h-28 p-3 text-xs border border-slate-100 rounded-xl bg-slate-50 outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="bg-white p-4 rounded-2xl border border-red-100 shadow-sm flex flex-col h-full">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] font-black text-red-600 uppercase tracking-widest">Críticos</label>
                                <button onclick="clearField(event, 'field-denied')" class="btn-clear text-[9px] font-black text-red-400 hover:text-red-700 transition-colors flex items-center gap-1"><i class="fas fa-eraser"></i> LIMPAR</button>
                            </div>
                            <textarea id="field-denied" oninput="debouncedSave()" class="w-full h-28 p-3 text-xs border border-slate-100 rounded-xl bg-slate-50 outline-none resize-none"></textarea>
                        </div>
                        
                        <!-- 5. CAIXA DE TAREFAS (Substitui o antigo 'Outros') -->
                        <div class="bg-white p-4 rounded-2xl border border-indigo-100 shadow-sm flex flex-col h-full">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Tarefas Diárias</label>
                                <button onclick="clearTasks(event)" class="btn-clear text-[9px] font-black text-indigo-400 hover:text-indigo-700 transition-colors flex items-center gap-1"><i class="fas fa-eraser"></i> LIMPAR TUDO</button>
                            </div>
                            <div class="flex flex-col h-28">
                                <div class="flex gap-2 mb-2 shrink-0" id="add-task-box">
                                    <input type="text" id="new-task-input" placeholder="Adicionar nova tarefa..." class="text-[11px] p-2 flex-1 border border-slate-200 rounded-lg bg-slate-50 outline-none focus:bg-white focus:border-indigo-400 transition-colors" onkeypress="if(event.key === 'Enter') addTask()">
                                    <button onclick="addTask()" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-black hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><i class="fas fa-plus"></i></button>
                                </div>
                                <div id="task-list" class="flex-1 overflow-y-auto custom-scroll space-y-1.5 pr-1 pb-1">
                                    <!-- As tarefas irão aparecer aqui -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="overlay" onclick="closeEditor()" class="absolute inset-0 bg-slate-900/10 backdrop-blur-sm z-20 hidden"></div>
        </div>
    </div>

    <!-- TUDO NUM SÓ SCRIPT FINAL PARA EVITAR ERROS E PARAGENS -->
    <script>
        // 🛡️ BLOQUEIO DE FERRAMENTAS DE DESENVOLVEDOR (ANTI-TI)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } 
        }

        // --- CONFIGURAÇÃO SUPABASE ---
        const apiKey = ""; 
        const PROJECT_URL = 'https://njoddjcobyqzaltzbvri.supabase.co'; 
        const PROJECT_KEY = 'sb_publishable_PITGaXHPP28arj3Pam8ryg_PdzjzY4u';
        
        let _supabase = null;
        if (window.supabase) _supabase = window.supabase.createClient(PROJECT_URL, PROJECT_KEY);

        let deviceId = localStorage.getItem('hemo_device_id') || crypto.randomUUID();
        localStorage.setItem('hemo_device_id', deviceId);
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const deviceType = isMobile ? 'mobile' : 'desktop';
        
        let isAdminLocal = localStorage.getItem('hemo_is_admin') === 'true';
        let currentUser = localStorage.getItem('hemo_user');
        
        // MODO ESPELHO: Variáveis de Leitura
        let isReadOnly = false;
        let targetDataEmail = '';

        let currentDate = new Date();
        let monthData = {}; 
        let selectedDay = null;
        let saveTimer = null;
        let isSaving = false;
        
        const MONTHS = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const WEEKDAYS = ["DOMINGO", "SEGUNDA FEIRA", "TERÇA FEIRA", "QUARTA FEIRA", "QUINTA FEIRA", "SEXTA FEIRA", "SÁBADO"];

        // O AUTO-LOGIN CONTINUA AQUI PARA A LETICIA NÃO TER QUE METER A SENHA TODAS AS VEZES
        window.onload = () => { if (currentUser) init(); else show('login'); };
        
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(`screen-${id}`).classList.add('active-screen'); }
        
        async function handleLogout() { 
            if (!isReadOnly) await save(); 
            localStorage.clear(); 
            location.reload(); 
        }

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-user').value.trim().toLowerCase();
            const p = document.getElementById('login-pass').value.trim();
            const msgBox = document.getElementById('login-msg');
            
            // 🛡️ LISTA VIP ATUALIZADA: Inclui Letícia, Admin e Equipa
            const isLeticia = u === 'leticialouis61@gmail.com';
            const isAdminAccount = u === 'jefersondsgomes@gmail.com' || u === 'jefersondsgomes10@gmail.com';
            const isViewerAccount = u === 'equipe@hemoagenda.com';

            if (!isLeticia && !isAdminAccount && !isViewerAccount) {
                msgBox.innerHTML = "❌ ACESSO PROIBIDO<br><span class='text-[9px] font-bold'>E-MAIL NÃO AUTORIZADO.</span>";
                return;
            }

            msgBox.innerText = "A entrar...";
            const { data } = await _supabase.from('hemo_users').select('*').eq('email', u).eq('password', p).maybeSingle();
            
            if (data) { 
                localStorage.setItem('hemo_user', u);
                currentUser = u; 
                init();
            } else { 
                msgBox.innerText = "❌ E-mail ou Senha incorretos"; 
            }
        }

        async function init() {
            // MODO ESPELHO: Aplicação de restrições de visualização
            if(currentUser === 'equipe@hemoagenda.com') {
                isReadOnly = true;
                targetDataEmail = 'leticialouis61@gmail.com'; // O sistema puxa os dados da Letícia
                
                const badge = document.getElementById('viewer-badge');
                if(badge) badge.style.display = 'block';
                
                const btnAdd = document.getElementById('btn-add-patient');
                if(btnAdd) btnAdd.style.display = 'none';
                
                document.querySelectorAll('.btn-clear').forEach(b => b.style.display = 'none');
                
                const taskBox = document.getElementById('add-task-box');
                if(taskBox) taskBox.style.display = 'none';
            } else {
                isReadOnly = false;
                targetDataEmail = currentUser; // Utilizador normal puxa os seus próprios dados
            }

            show('app'); renderCalendar(); await fetchData(); setupRealtime();
        }

        async function fetchData(silent = false) {
            if (!_supabase || saveTimer || isSaving) return;
            const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}%`;
            // MODO ESPELHO: Usa targetDataEmail para buscar as informações certas
            const { data } = await _supabase.from('hemo_agenda').select('*').eq('user_email', targetDataEmail).like('date_key', monthKey);
            if (data) { data.forEach(d => monthData[d.date_key] = d); renderCalendar(); }
        }

        function setupRealtime() {
            // CANAL DA NUVEM RESTAURADO: cloud-sync-v97 (Exatamente como pediu para não perder a sincronização)
            _supabase.channel('cloud-sync-v97').on('postgres_changes', { event: '*', schema: 'public', table: 'hemo_agenda' }, (payload) => {
                // MODO ESPELHO: Escuta o targetDataEmail em vez do seu próprio
                if (payload.new.user_email === targetDataEmail) {
                    monthData[payload.new.date_key] = payload.new;
                    renderCalendar();
                    if (selectedDay === payload.new.date_key && document.activeElement.tagName === 'BODY') refreshEditor(payload.new);
                }
            }).subscribe();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            document.getElementById('month-display').innerText = MONTHS[currentDate.getMonth()];
            document.getElementById('year-display').innerText = currentDate.getFullYear();
            grid.innerHTML = '';
            const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const total = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const today = new Date().toISOString().split('T')[0];
            let tPacs = 0, tDias = 0, tPends = 0;
            for(let i=0; i<first; i++) grid.innerHTML += `<div class="min-h-[120px] bg-slate-100/40 rounded-xl border border-dashed border-slate-200"></div>`;
            for(let d=1; d<=total; d++) {
                const key = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = monthData[key] || {}; const procs = (data.procedures || []);
                if(procs.length > 0) { tDias++; tPacs += procs.length; }
                if(data.pend?.trim()) tPends++;
                grid.innerHTML += `
                    <div onclick="openEditor('${key}')" class="day-cell p-3 ${selectedDay === key ? 'day-active' : ''} ${key === today ? 'day-today' : ''}">
                        <div class="flex justify-between items-start mb-2"><span class="day-number text-[11px] font-black text-slate-500">${d}</span>${procs.length > 0 ? `<div class="badge-count">${procs.length}</div>` : ''}</div>
                        <div class="patient-list-mini">${procs.slice(0,2).map(p => `<div class="patient-item-mini">${p.patient || '---'}</div>`).join('')}</div>
                        <div class="status-bar">
                            ${(data.auth?.trim()) ? '<div class="status-dot bg-emerald-500"></div>' : ''}
                            ${(data.pend?.trim()) ? '<div class="status-dot bg-amber-500"></div>' : ''}
                            ${(data.issue?.trim()) ? '<div class="status-dot bg-red-500"></div>' : ''}
                        </div>
                    </div>`;
            }
            document.getElementById('stat-pacientes').innerText = tPacs;
            document.getElementById('stat-dias').innerText = tDias;
            document.getElementById('stat-pends').innerText = tPends;
        }

        async function openEditor(key) {
            // MODO ESPELHO: Se for visualizador (!isReadOnly), não tenta gravar no banco ao mudar de dia
            if (selectedDay && selectedDay !== key && !isReadOnly) await save();
            selectedDay = key; const data = monthData[key] || { procedures: [] };
            refreshEditor(data);
            document.getElementById('editor-day-num').innerText = key.split('-')[2];
            document.getElementById('editor-date').innerText = `${key.split('-')[2]} DE ${MONTHS[currentDate.getMonth()].toUpperCase()}`;
            document.getElementById('editor-panel').classList.remove('editor-closed');
            document.getElementById('overlay').classList.remove('hidden');
        }

        async function closeEditor() { 
            // MODO ESPELHO: Se for visualizador, fecha a tela sem tentar gravar
            if(!isReadOnly) await save(); 
            document.getElementById('editor-panel').classList.add('editor-closed'); 
            document.getElementById('overlay').classList.add('hidden'); 
            selectedDay = null; renderCalendar(); 
        }

        function refreshEditor(data) {
            document.getElementById('field-obs-geral').value = data.obs_geral || '';
            document.getElementById('field-auth').value = data.auth || '';
            document.getElementById('field-pend').value = data.pend || '';
            document.getElementById('field-denied').value = data.issue || ''; 
            
            // MODO ESPELHO: Desativa as caixas de notas para não edição
            const fields = ['field-obs-geral', 'field-auth', 'field-pend', 'field-denied', 'new-task-input'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                if (el) {
                    if (isReadOnly) el.setAttribute('disabled', 'true');
                    else el.removeAttribute('disabled');
                }
            });

            renderTasks();

            const body = document.getElementById('agenda-body'); body.innerHTML = '';
            (data.procedures || []).forEach((p, idx) => {
                const tr = document.createElement('tr');
                // MODO ESPELHO: Desativa todos os campos da tabela (${isReadOnly ? 'disabled' : ...}) e tira botão do lixo
                tr.innerHTML = `
                    <td><input type="time" value="${p.time || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'time', this.value)"`}></td>
                    <td>
                        <select ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'room', this.value)"`} class="custom-select text-blue-700 font-bold">
                            <option value="1" ${p.room === '1' ? 'selected' : ''}>SALA 1</option>
                            <option value="2" ${p.room === '2' ? 'selected' : ''}>SALA 2</option>
                            <option value="RPA" ${p.room === 'RPA' ? 'selected' : ''}>RPA</option>
                        </select>
                    </td>
                    <td><input type="text" value="${p.patient || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'patient', this.value)"`} class="font-black uppercase text-slate-700"></td>
                    <td><input type="text" value="${p.dn || ''}" ${isReadOnly ? 'disabled' : `oninput="maskDate(this)" onchange="handleAgeAuto(${idx}, this.value)"`}></td>
                    <td><input type="number" id="age-${idx}" value="${p.age || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'age', this.value)"`}></td>
                    <td><input type="text" value="${p.insurance || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'insurance', this.value)"`} class="uppercase"></td>
                    <td><input type="text" value="${p.doctor || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'doctor', this.value)"`} class="uppercase text-blue-600 font-bold"></td>
                    <td><input type="text" value="${p.origin || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'origin', this.value)"`} class="uppercase"></td>
                    <td><input type="text" value="${p.proc || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'proc', this.value)"`} class="uppercase font-medium"></td>
                    <td><input type="text" value="${p.dest || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'dest', this.value)"`} class="uppercase"></td>
                    <td><input type="text" value="${p.opme || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'opme', this.value)"`} class="uppercase"></td>
                    <td><input type="text" value="${p.obs || ''}" ${isReadOnly ? 'disabled' : `onchange="updateRow(${idx}, 'obs', this.value)"`}></td>
                    <td>${!isReadOnly ? `<button onclick="delRow(${idx})" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>` : ''}</td>`;
                body.appendChild(tr);
            });
        }

        // --- SISTEMA DE TAREFAS DIÁRIAS (CHECKLISTS) ---
        function getTasks() {
            if (!monthData[selectedDay]) return [];
            let val = monthData[selectedDay].unauth; // Usamos o campo antigo unauth como repositório invisível
            if (!val) return [];
            try { return JSON.parse(val); } catch (e) { return [{ text: val, done: false }]; }
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            if(!list) return;
            const tasks = getTasks();
            list.innerHTML = tasks.map((t, i) => `
                <div class="flex items-center justify-between p-1.5 bg-white rounded-lg border ${t.done ? 'border-indigo-100 bg-indigo-50/30' : 'border-slate-200'} group hover:border-indigo-300 transition-colors shadow-sm">
                    <div class="flex items-center gap-2 overflow-hidden flex-1">
                        <input type="checkbox" ${t.done ? 'checked' : ''} ${isReadOnly ? 'disabled' : `onchange="toggleTask(${i})"`} class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer flex-shrink-0">
                        <span class="text-[11px] truncate ${t.done ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}" title="${t.text}">${t.text}</span>
                    </div>
                    ${!isReadOnly ? `<button onclick="deleteTask(${i})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity px-2"><i class="fas fa-times"></i></button>` : ''}
                </div>
            `).join('');
        }

        function addTask() {
            if(isReadOnly) return; // MODO ESPELHO: Bloqueia ações
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (!text) return;
            const tasks = getTasks();
            tasks.push({ text, done: false });
            if(!monthData[selectedDay]) monthData[selectedDay] = {};
            monthData[selectedDay].unauth = JSON.stringify(tasks);
            input.value = '';
            renderTasks();
            debouncedSave();
        }

        function toggleTask(idx) {
            if(isReadOnly) return; // MODO ESPELHO: Bloqueia ações
            const tasks = getTasks();
            tasks[idx].done = !tasks[idx].done;
            monthData[selectedDay].unauth = JSON.stringify(tasks);
            renderTasks();
            debouncedSave();
        }

        function deleteTask(idx) {
            if(isReadOnly) return; // MODO ESPELHO: Bloqueia ações
            const tasks = getTasks();
            tasks.splice(idx, 1);
            monthData[selectedDay].unauth = JSON.stringify(tasks);
            renderTasks();
            debouncedSave();
        }

        function clearTasks(e) {
            if(isReadOnly) return; // MODO ESPELHO: Bloqueia ações
            if(monthData[selectedDay]) monthData[selectedDay].unauth = '[]';
            renderTasks();
            debouncedSave();
            const btn = e.currentTarget;
            if(btn) {
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> FEITO';
                btn.style.color = '#10b981'; 
                setTimeout(() => { btn.innerHTML = originalText; btn.style.color = ''; }, 2000);
            }
        }

        // --- SISTEMA DE BOTÕES LIMPAR TUDO ---
        function clearField(e, fieldId) {
            if(isReadOnly) return; // MODO ESPELHO: Bloqueia ações
            const el = document.getElementById(fieldId);
            if(el) {
                el.value = ''; 
                if(monthData[selectedDay]) {
                    if(fieldId === 'field-obs-geral') monthData[selectedDay].obs_geral = '';
                    if(fieldId === 'field-auth') monthData[selectedDay].auth = '';
                    if(fieldId === 'field-pend') monthData[selectedDay].pend = '';
                    if(fieldId === 'field-denied') monthData[selectedDay].issue = '';
                }
                debouncedSave(); 
                const btn = e.currentTarget;
                if(btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> FEITO';
                    btn.style.color = '#10b981'; 
                    setTimeout(() => { btn.innerHTML = originalText; btn.style.color = ''; }, 2000);
                }
            }
        }

        function addRow() {
            if (isReadOnly) return; // MODO ESPELHO: Impede Adicionar linha
            if (!monthData[selectedDay]) monthData[selectedDay] = { procedures: [] };
            monthData[selectedDay].procedures.push({ time: '', room: '1' });
            refreshEditor(monthData[selectedDay]); debouncedSave();
        }

        function updateRow(idx, f, v) { if (isReadOnly) return; monthData[selectedDay].procedures[idx][f] = v; debouncedSave(); }
        function delRow(idx) { if (isReadOnly) return; monthData[selectedDay].procedures.splice(idx, 1); refreshEditor(monthData[selectedDay]); debouncedSave(); }
        
        function debouncedSave() { 
            if (isReadOnly) return; // MODO ESPELHO: Impede envio para a base de dados
            document.getElementById('cloudIcon').className = "fas fa-sync fa-spin text-amber-500";
            document.getElementById('cloudLabel').innerText = "Aguarde...";
            clearTimeout(saveTimer); saveTimer = setTimeout(save, 700); 
        }

        async function save() {
            if (!selectedDay || isReadOnly) return; // MODO ESPELHO: Impede gravação
            
            // O SEU ESCUDO DE DADOS: monthData[selectedDay] = p garante que as letras não piscam e somem!
            const p = {
                user_email: currentUser, date_key: selectedDay,
                obs_geral: document.getElementById('field-obs-geral')?.value || '',
                auth: document.getElementById('field-auth')?.value || '',
                pend: document.getElementById('field-pend')?.value || '',
                issue: document.getElementById('field-denied')?.value || '',
                unauth: monthData[selectedDay]?.unauth || '', // As tarefas da Letícia
                procedures: monthData[selectedDay]?.procedures || [],
                updated_at: new Date().toISOString()
            };
            monthData[selectedDay] = p; // Proteção mantida a 100%

            const { error } = await _supabase.from('hemo_agenda').upsert(p, { onConflict: 'user_email, date_key' });
            document.getElementById('cloudIcon').className = error ? "fas fa-exclamation-triangle text-red-500" : "fas fa-cloud text-emerald-500";
            document.getElementById('cloudLabel').innerText = error ? "Erro!" : "Nuvem OK";
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('landscape');
            const data = monthData[selectedDay] || { procedures: [] };
            const dateParts = selectedDay.split('-');
            const dateObj = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
            const formattedDate = `DIA ${dateParts[2]}/${dateParts[1]} (${WEEKDAYS[dateObj.getDay()]})`;

            doc.setFillColor(218, 232, 252); doc.rect(14, 10, 269, 12, 'F');
            doc.setFontSize(22); doc.setFont(undefined, 'bold'); doc.text('HEMODINÂMICA', 148.5, 19, { align: 'center' });
            doc.setFillColor(255, 255, 0); doc.rect(14, 25, 75, 8, 'F');
            doc.setFontSize(10); doc.text(formattedDate, 16, 30.5);

            const cols = ['HORÁRIO', 'SALA/RPA', 'PACIENTE', 'DN', 'IDADE', 'CONVÊNIO', 'MÉDICO EXECUTOR', 'ORIGEM', 'PROCEDIMENTO', 'DESTINO', 'OPME', 'OBSERVAÇÃO'];
            
            let sorted = [...(data.procedures || [])].sort((a, b) => (a.time || '23:59').localeCompare(b.time || '23:59'));

            let rows = sorted.length > 0 ? sorted.map(p => [
                p.time||'', p.room||'', p.patient?.toUpperCase()||'', p.dn||'', p.age||'', 
                p.insurance?.toUpperCase()||'', p.doctor?.toUpperCase()||'', p.origin?.toUpperCase()||'', 
                p.proc?.toUpperCase()||'', p.dest?.toUpperCase()||'', p.opme?.toUpperCase()||'', p.obs||''
            ]) : [['', '', '', '', '', '', '', '', '', '', '', '']];

            doc.autoTable({ 
                startY: 35, head: [cols], body: rows, theme: 'grid', 
                styles: { fontSize: 7, halign: 'center', textColor: [0, 0, 0], lineWidth: 0.3, lineColor: [0, 0, 0] }, 
                headStyles: { fillColor: [255, 255, 255], textColor: [0,0,0], fontStyle: 'bold', lineWidth: 0.3 }, 
                columnStyles: { 2: { fontStyle: 'bold', cellWidth: 45 } } 
            });
            doc.save(`Agenda_${selectedDay}.pdf`);
        }

        async function exportPDFVazio() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('landscape');
            doc.setFillColor(218, 232, 252); doc.rect(14, 10, 269, 12, 'F');
            doc.setFontSize(22); doc.setFont(undefined, 'bold'); doc.text('HEMODINÂMICA', 148.5, 19, { align: 'center' });
            const cols = ['HORÁRIO', 'SALA/RPA', 'PACIENTE', 'DN', 'IDADE', 'CONVÊNIO', 'MÉDICO EXECUTOR', 'ORIGEM', 'PROCEDIMENTO', 'DESTINO', 'OPME', 'OBSERVAÇÃO'];
            doc.autoTable({ startY: 35, head: [cols], body: [[{ content: 'SEM AGENDAMENTO', colSpan: 12, styles: { halign: 'center', fontStyle: 'bold', fontSize: 16, cellPadding: 20 } }]], theme: 'grid', styles: { lineWidth: 0.3, lineColor: [0, 0, 0] } });
            doc.save(`Agenda_Vazia_${selectedDay}.pdf`);
        }

        function handleAgeAuto(idx, dob) { if (isReadOnly) return; updateRow(idx, 'dn', dob); if(dob.length === 10) { const parts = dob.split('/'); const age = new Date().getFullYear() - new Date(parts[2], parts[1]-1, parts[0]).getFullYear(); if(!isNaN(age)) { document.getElementById(`age-${idx}`).value = age; updateRow(idx, 'age', age); } } }
        function maskDate(i) { if (isReadOnly) return; let v = i.value.replace(/\D/g, '').slice(0, 8); if(v.length>=5) v=`${v.slice(0,2)}/${v.slice(2,4)}/${v.slice(4)}`; else if(v.length>=3) v=`${v.slice(0,2)}/${v.slice(2)}`; i.value=v; }
        function changeMonth(v) { currentDate.setMonth(currentDate.getMonth()+v); fetchData(); renderCalendar(); }
        function goToToday() { currentDate = new Date(); fetchData(); renderCalendar(); }
    </script>
</body>
</html>
